<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Million Dollar Homepage</title>
    <!-- Fixed Production CDN Dependencies -->
    <script src="https://unpkg.com" crossorigin="anonymous"></script>
    <script src="https://unpkg.com" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        header { padding: 20px; background: #1e293b; border-bottom: 2px solid #334155; }
        h1 { margin: 0; color: #38bdf8; font-size: 2.5rem; }
        .stats { margin-top: 10px; font-size: 1.1rem; color: #94a3b8; }
        #canvas-container { width: 1000px; height: 1000px; margin: 30px auto; position: relative; }
        canvas { border: 4px solid #334155; background: #000; display: block; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: crosshair; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 30px; border-radius: 12px; border: 2px solid #38bdf8; box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 100; width: 320px; }
        .modal h3 { margin-top: 0; color: #38bdf8; }
        .modal input { width: 90%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #475569; color: #fff; border-radius: 6px; }
        .modal button { width: 100%; padding: 12px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .modal button:hover { background: #0ea5e9; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index: 50; }
    </style>
</head>
<body>

    <header>
        <h1>Crypto Million Dollar Homepage</h1>
        <div class="stats">1 Pixel Block = 0.001 ETH (Base Network) | Click any 10x10 block to buy!</div>
    </header>

    <!-- 1000x1000 Interaction Canvas Container -->
    <div id="canvas-container">
        <canvas id="gridCanvas" width="1000" height="1000"></canvas>
    </div>

    <!-- Overlay and Checkout Modal -->
    <div class="overlay" id="overlay"></div>
    <div class="modal" id="buyModal">
        <h3>Buy Pixel Block</h3>
        <p id="blockCoords">Selected Block: (X, Y)</p>
        <p>Price: <strong>0.001 ETH</strong></p>
        <input type="text" id="imgUrl" placeholder="10x10 Image Link (PNG/JPG)">
        <input type="text" id="linkUrl" placeholder="Your Website Link (https://...)">
        <button id="payBtn">Pay with Crypto Wallet</button>
    </div>

    <script>
        // 🔒 Production Parameters Loaded Successfully
        const SUPABASE_URL = "https://kvtdelsdifkerfepvkvn.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2dGRlbHNkaWZrZXJmZXB2a3ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTE0MjUsImV4cCI6MjA5NTI2NzQyNX0.CAZXKUsP47fDiVxiH830Z3nXCFRb4m6XLtP-KX5bE5o"; 
        const MY_WALLET = "0x69142E445C25e4619f49E0DCEac86300f146B624"; 

        // Initialize production connection
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const buyModal = document.getElementById('buyModal');
        const blockCoords = document.getElementById('blockCoords');
        const payBtn = document.getElementById('payBtn');

        let selectedX = 0;
        let selectedY = 0;
        const imageCache = {}; // Client-side execution memory optimization

        // 1. Optimized High-Speed Render Matrix Loop
        async function fetchAndDrawPixels() {
            const { data: pixels, error } = await supabaseClient.from('pixels').select('*');
            
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 1000, 1000);
            ctx.strokeStyle = '#222';
            for(let i=0; i<1000; i+=10) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1000, i); ctx.stroke();
            }

            if (pixels) {
                pixels.forEach(p => {
                    if (imageCache[p.image_url]) {
                        ctx.drawImage(imageCache[p.image_url], p.x, p.y, p.width, p.height);
                    } else {
                        const img = new Image();
                        img.crossOrigin = "anonymous";
                        img.src = p.image_url;
                        img.onload = () => {
                            imageCache[p.image_url] = img;
                            ctx.drawImage(img, p.x, p.y, p.width, p.height);
                        };
                    }
                });
            }
        }

        // 2. Exact Click Coordinate Target Tracker
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            selectedX = Math.floor((e.clientX - rect.left) / 10) * 10;
            selectedY = Math.floor((e.clientY - rect.top) / 10) * 10;

            blockCoords.innerText = `Selected Block: X=${selectedX}, Y=${selectedY}`;
            overlay.style.display = 'block';
            buyModal.style.display = 'block';
        });

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            buyModal.style.display = 'none';
        });

        // 3. Automated Base Network Switch & Secure Contract Handler Call
        payBtn.addEventListener('click', async () => {
            const imgUrl = document.getElementById('imgUrl').value;
            const linkUrl = document.getElementById('linkUrl').value;

            if(!imgUrl || !linkUrl) return alert("Please fill out both fields!");
            if(!window.ethereum) return alert("Please run inside a wallet-integrated ecosystem!");

            try {
                payBtn.innerText = "Connecting Wallet...";
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();

                // Direct Auto-Switch Request to Base Chain ID (8453)
                const BASE_CHAIN_ID = "0x2105"; 
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: BASE_CHAIN_ID }],
                    });
                } catch (switchError) {
                    if (switchError.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: BASE_CHAIN_ID,
                                chainName: 'Base Mainnet',
                                nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                                rpcUrls: ['https://base.org'],
                                blockExplorerUrls: ['https://basescan.org']
                            }],
                        });
                    } else { throw switchError; }
                }

                payBtn.innerText = "Awaiting Tx Confirmation...";
                const tx = await signer.sendTransaction({
                    to: MY_WALLET,
                    value: ethers.utils.parseEther("0.001") 
                });

                payBtn.innerText = "Indexing Blockchain Ref...";
                await tx.wait(); 

                const { error } = await supabaseClient.rpc('buy_pixel_secure', {
                    _x: selectedX,
                    _y: selectedY,
                    _width: 10,
                    _height: 10,
                    _image_url: imgUrl,
                    _link_url: linkUrl,
                    _tx_hash: tx.hash
                });

                if(error) throw error;

                alert("Block secured successfully!");
                overlay.style.display = 'none';
                buyModal.style.display = 'none';
                fetchAndDrawPixels();

            } catch (err) {
                console.error(err);
                alert("Transaction canceled or security validation failed.");
            } finally {
                payBtn.innerText = "Pay with Crypto Wallet";
            }
        });

        // Double Click Redirection Logic
        canvas.addEventListener('dblclick', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = Math.floor((e.clientX - rect.left) / 10) * 10;
            const clickY = Math.floor((e.clientY - rect.top) / 10) * 10;

            const { data } = await supabaseClient.from('pixels').select('*').eq('x', clickX).eq('y', clickY).single();
            if(data && data.link_url) {
                window.open(data.link_url, '_blank');
            }
        });

        fetchAndDrawPixels();
    </script>
</body>
</html>
