<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Million Dollar Homepage</title>
    <!-- Free Web3 and Database Libraries -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        header { padding: 20px; background: #1e293b; border-bottom: 2px solid #334155; }
        h1 { margin: 0; color: #38bdf8; font-size: 2.5rem; }
        .stats { margin-top: 10px; font-size: 1.1rem; color: #94a3b8; }
        canvas { border: 4px solid #334155; background: #000; margin: 30px auto; display: block; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: crosshair; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 30px; border-radius: 12px; border: 2px solid #38bdf8; box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 10; width: 320px; }
        .modal h3 { margin-top: 0; color: #38bdf8; }
        .modal input { width: 90%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #475569; color: #fff; border-radius: 6px; }
        .modal button { width: 100%; padding: 12px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .modal button:hover { background: #0ea5e9; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index: 5; }
    </style>
</head>
<body>

    <header>
        <h1>Crypto Million Dollar Homepage</h1>
        <div class="stats">1 Pixel = 0.00001 ETH (Base Network) | Click any 10x10 block to buy!</div>
    </header>

    <!-- The 1000x1000 Canvas Grid -->
    <canvas id="gridCanvas" width="1000" height="1000"></canvas>

    <!-- Overlay and Purchase Modal Popup -->
    <div class="overlay" id="overlay"></div>
    <div class="modal" id="buyModal">
        <h3>Buy Pixel Block</h3>
        <p id="blockCoords">Selected Block: (X, Y)</p>
        <p>Price: <strong>0.001 ETH</strong> (~$3.00)</p>
        <input type="text" id="imgUrl" placeholder="10x10 Image Link (PNG/JPG)">
        <input type="text" id="linkUrl" placeholder="Your Website Link (https://...)">
        <button id="payBtn">Pay with Crypto Wallet</button>
    </div>

    <script>
        // 🚨 CONFIGURATION
        const SUPABASE_URL = "https://supabase.com/dashboard/project/kvtdelsdifkerfepvkvn"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2dGRlbHNkaWZrZXJmZXB2a3ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTE0MjUsImV4cCI6MjA5NTI2NzQyNX0.CAZXKUsP47fDiVxiH830Z3nXCFRb4m6XLtP-KX5bE5o"; 
        const MY_WALLET = "0x69142E445C25e4619f49E0DCEac86300f146B624"; 

        // Initialize Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const buyModal = document.getElementById('buyModal');
        const blockCoords = document.getElementById('blockCoords');
        const payBtn = document.getElementById('payBtn');

        let selectedX = 0;
        let selectedY = 0;

        // 1. Fetch Paid Blocks from Cloud Database and Draw Them
        async function fetchAndDrawPixels() {
            const { data: pixels, error } = await supabaseClient.from('pixels').select('*');
            
            // Draw a subtle grid background
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 1000, 1000);
            ctx.strokeStyle = '#222';
            for(let i=0; i<1000; i+=10) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1000, i); ctx.stroke();
            }

            if (pixels) {
                pixels.forEach(p => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.src = p.image_url;
                    img.onload = () => {
                        ctx.drawImage(img, p.x, p.y, p.width, p.height);
                    };
                });
            }
        }

        // 2. Handle Grid Clicking to Open Purchase Menu
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Snap perfectly to a 10x10 block grid system
            selectedX = Math.floor((e.clientX - rect.left) / 10) * 10;
            selectedY = Math.floor((e.clientY - rect.top) / 10) * 10;

            blockCoords.innerText = `Selected Block: X=${selectedX}, Y=${selectedY}`;
            overlay.style.display = 'block';
            buyModal.style.display = 'block';
        });

        // Close modal if user clicks outside
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            buyModal.style.display = 'none';
        });

        // 3. Process Live Web3 Transaction and Update Database
        payBtn.addEventListener('click', async () => {
            const imgUrl = document.getElementById('imgUrl').value;
            const linkUrl = document.getElementById('linkUrl').value;

            if(!imgUrl || !linkUrl) return alert("Please fill out both fields!");
            if(!window.ethereum) return alert("Please install MetaMask or a Web3 wallet extension!");

            try {
                payBtn.innerText = "Connecting Wallet...";
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();

                payBtn.innerText = "Waiting for Payment...";
                // Sends direct blockchain transaction to YOUR wallet address
                const tx = await signer.sendTransaction({
                    to: MY_WALLET,
                    value: ethers.utils.parseEther("0.001") // Custom price: 0.001 ETH per 10x10 block
                });

                payBtn.innerText = "Confirming on Blockchain...";
                await tx.wait(); // Wait for network block verification

                // Insert data directly to Supabase cloud
                const { error } = await supabaseClient.from('pixels').insert([
                    { x: selectedX, y: selectedY, width: 10, height: 10, image_url: imgUrl, link_url: linkUrl, tx_hash: tx.hash }
                ]);

                if(error) throw error;

                alert("Success! Your block is secured.");
                overlay.style.display = 'none';
                buyModal.style.display = 'none';
                fetchAndDrawPixels();

            } catch (err) {
                console.error(err);
                alert("Transaction failed or rejected.");
            } finally {
                payBtn.innerText = "Pay with Crypto Wallet";
            }
        });

        // Click a bought block to open its link
        canvas.addEventListener('dblclick', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = Math.floor((e.clientX - rect.left) / 10) * 10;
            const clickY = Math.floor((e.clientY - rect.top) / 10) * 10;

            const { data } = await supabaseClient.from('pixels').select('*').eq('x', clickX).eq('y', clickY).single();
            if(data && data.link_url) {
                window.open(data.link_url, '_blank');
            }
        });

        // Load page
        fetchAndDrawPixels();
    </script>
</body>
</html>
